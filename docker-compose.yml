version: "3.9"

services:
  api:
    build: .
    container_name: email-analysis-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    container_name: email-dashboard
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: streamlit run dashboard/dashboard.py --server.address=0.0.0.0
